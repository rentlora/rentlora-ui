  # ---------------------------------------------------------------------------
  # 5. GITOPS UPDATE (Updates DEV or PROD helm values)
  # ---------------------------------------------------------------------------
  gitops:
    name: GitOps Update
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token:      ${{ secrets.GIT_TOKEN }}
          path:       _helm

      - uses: mikefarah/yq@v4

      - run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Production Release 
            FILE="${{ env.SERVICE }}/values-prod.yaml"
            ENV_NAME="PROD"
          else
            # Development Release
            FILE="${{ env.SERVICE }}/values-dev.yaml"
            ENV_NAME="DEV"
          fi
          
          yq e ".image.tag = \"${{ needs.docker.outputs.image_tag }}\"" -i _helm/$FILE
          
          cd _helm
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $FILE
          git diff --staged --quiet && exit 0
          git commit -m "ci(${{ env.SERVICE }}): deploy ${{ needs.docker.outputs.image_tag }} to $ENV_NAME [skip ci]"
          git push origin main

  # ---------------------------------------------------------------------------
  # 6. SUCCESS NOTIFICATION
  # ---------------------------------------------------------------------------
  notify-success:
    name: Notify Success
    needs: [docker, gitops]
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/slack-notify
        with:
          status: "success"
          pipeline: "CI/CD"
          job_name: "all"
          service_name:          ${{ env.SERVICE }}
          docker_image:          ${{ env.IMAGE_NAME }}
          docker_tag:            ${{ needs.docker.outputs.image_tag }}
