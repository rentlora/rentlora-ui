  # ---------------------------------------------------------------------------
  # 3. DOCKER BUILD & PUSH (Skips PRs, only runs on Push)
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    # needs: snyk-sca
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag (Manual Release vs Dev SHA)
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Production Release (Triggered by manual tag)
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "image_tag=$TAG_NAME" >> $GITHUB_OUTPUT
          else
            # Development Release (Triggered by develop branch)
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "image_tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context:    .
          push:       true
          tags:       ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - if: failure()
        uses: ./.github/actions/slack-notify
        with:
          status: "failed"
          pipeline: "CI/CD"
          job_name: "docker"
          service_name:       ${{ env.SERVICE }}
          docker_image:       ${{ env.IMAGE_NAME }}
          docker_tag:         ${{ steps.tag.outputs.image_tag }}
          slack_webhook_url:  ${{ secrets.SLACK_WEBHOOK_URL }}
          gmail_username:     ${{ secrets.GMAIL_USERNAME }}
          gmail_app_password:  ${{ secrets.GMAIL_APP_PASSWORD }}
          notify_email_to:     ${{ secrets.NOTIFY_EMAIL_TO }}

