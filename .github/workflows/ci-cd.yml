name: CI/CD Pipeline

on:
  push:
    branches: [develop]       # Auto-deploy to DEV on develop branch
    tags: ['v*.*.*']          # Manual release to PROD when tag is created
  pull_request:
    branches: [develop, main] # Only run CI (Sonar/Snyk) on PRs

permissions:
  security-events: write
  contents: write
  packages: write

